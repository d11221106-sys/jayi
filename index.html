<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>租屋族電費隨手記(雲端同步版)</title>
    <style>
        :root {
            --bg-color: #fef8f0;
            --card-bg: #ffffff;
            --primary: #ffb0bc;
            --primary-dark: #ff94a4;
            --secondary: #ffebc2;
            --text-main: #6d5448;
            --text-muted: #a38f85;
            --border-color: #ecd5c5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#f7e7da 15%, transparent 15%);
            background-size: 20px 20px;
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .app-container {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            border: 3px solid var(--text-main);
            border-radius: 24px;
            box-shadow: 4px 4px 0px var(--text-main);
            padding: 16px;
            margin-top: 5px;
            position: relative;
        }

        .loading-mask {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(254, 248, 240, 0.8);
            z-index: 10;
            border-radius: 24px;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            margin: 8px 0 20px 0;
            font-size: 22px;
            font-weight: 900;
        }

        h1 span { background: linear-gradient(transparent 60%, var(--secondary) 60%); }

        .section-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .section-title { font-size: 14px; font-weight: 800; color: var(--text-main); }

        .card {
            background: #fffdfa;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        
        input {
            border: 2px solid var(--text-main);
            border-radius: 10px;
            padding: 10px 8px;
            font-size: 15px;
            color: var(--text-main);
            background-color: #fff;
            outline: none;
            width: 100%;
        }

        .btn {
            background-color: var(--primary);
            color: var(--text-main);
            border: 2px solid var(--text-main);
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 3px 0px var(--text-main);
            transition: all 0.1s ease;
            margin-top: 4px;
        }

        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0px var(--text-main); }
        .btn-export {
            background-color: #e2f0d9;
            color: var(--text-main);
            border: 1.5px solid var(--text-main);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 1.5px 0px var(--text-main);
        }

        .month-box {
            background: #fff;
            border: 2px solid var(--text-main);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
            box-shadow: 3px 3px 0px var(--border-color);
        }

        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .month-name {
            font-size: 14px;
            font-weight: 900;
            background-color: var(--secondary);
            padding: 4px 8px;
            border-radius: 12px;
            border: 1.5px solid var(--text-main);
            line-height: 1.3;
        }

        .month-summary { text-align: right; font-size: 12px; font-weight: 700; line-height: 1.4; }
        .month-total-cost { color: #de5462; font-size: 15px; font-weight: 800; }

        .month-stats-bar {
            display: flex;
            justify-content: space-between;
            background-color: #fffdf5;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            color: #8c6f60;
            margin-bottom: 8px;
            border: 1px solid #f2e3d5;
        }

        .stats-val { color: #de5462; font-weight: 800; }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px;
            font-size: 14px;
            border-bottom: 1px dotted #eee;
        }
        .history-item:last-child { border-bottom: none; }
        .item-left { display: flex; flex-direction: column; gap: 2px; }
        .item-time { font-size: 11px; color: var(--text-muted); }
        .item-degree { font-weight: 700; }
        .item-right { display: flex; align-items: center; gap: 8px; }
        .item-cost { font-weight: normal; font-size: 12px; color: var(--text-muted); }
        .btn-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 4px 8px; }
        .empty-tips { text-align: center; color: var(--text-muted); font-size: 12px; padding: 20px 0; }
        .footer-tip { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 16px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="loading-mask" id="loadingMask">☁️ 雲端同步中...</div>
    <h1><span>🍮 租屋電費隨手記(雲端版)</span></h1>

    <div class="card grid-2">
        <div class="form-group">
            <label for="base">初始底數 (上期)</label>
            <input type="number" id="base" step="0.1" value="0">
        </div>
        <div class="form-group">
            <label for="rate">每度電費 (元)</label>
            <input type="number" id="rate" step="0.1" value="5">
        </div>
    </div>

    <div class="section-title-container">
        <div class="section-title">✍️ 紀錄今天度數</div>
    </div>
    <div class="card">
        <div class="form-group">
            <label for="current">目前看到的電表度數</label>
            <input type="number" id="current" step="0.1" placeholder="填入含小數點的數字">
        </div>
        <button class="btn" id="addRecordBtn">🍮 記錄並同步雲端</button>
    </div>

    <div class="section-title-container">
        <div class="section-title">📅 結算帳本 (15日結)</div>
        <button class="btn-export" id="exportBtn">🍮 匯出 Excel</button>
    </div>
    <div id="monthContainer"></div>

    <div class="footer-tip">
        本版本已連線至您的 Google 雲端試算表！<br>
        手機與電腦打開同個網址，資料完全同步 🐾
    </div>
</div>

<script>
    // 您的專屬雲端網址已自動填入
    const API_URL = "https://script.google.com/macros/s/AKfycbyi-n6aOErOZipDoptgdcbTW4ibQ2tZqDuobbg5NigLb37uHkmSqglKybsvMXVrkmOL/exec";

    const baseInput = document.getElementById('base');
    const rateInput = document.getElementById('rate');
    const currentInput = document.getElementById('current');
    const addRecordBtn = document.getElementById('addRecordBtn');
    const exportBtn = document.getElementById('exportBtn');
    const monthContainer = document.getElementById('monthContainer');
    const loadingMask = document.getElementById('loadingMask');

    let historyData = [];

    function showLoading(show) { loadingMask.style.display = show ? 'flex' : 'none'; }

    // 用來美化時間格式的輔助函式
    function formatTimeStr(rawTime) {
        if (!rawTime) return "";
        // 如果原本就是格式化好的字串（例如 "06/22 0:55"），就直接返回
        if (typeof rawTime === 'string' && rawTime.includes('/')) return rawTime;
        
        try {
            const d = new Date(rawTime);
            if (isNaN(d.getTime())) return String(rawTime);
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const date = String(d.getDate()).padStart(2, '0');
            const h = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${m}/${date} ${h}:${min}`;
        } catch(e) {
            return String(rawTime);
        }
    }

    async function loadData() {
        if (localStorage.getItem('rent_cute_base')) baseInput.value = localStorage.getItem('rent_cute_base');
        if (localStorage.getItem('rent_cute_rate')) rateInput.value = localStorage.getItem('rent_cute_rate');
        
        showLoading(true);
        try {
            const response = await fetch(API_URL);
            historyData = await response.json();
        } catch (e) {
            console.error("雲端載入失敗，改用本地暫存", e);
            const localHistory = localStorage.getItem('rent_cute_history');
            if (localHistory) historyData = JSON.parse(localHistory);
        }
        showLoading(false);
        renderMonths();
    }

    function saveSettingsLocal() {
        localStorage.setItem('rent_cute_base', baseInput.value || 0);
        localStorage.setItem('rent_cute_rate', rateInput.value || 0);
    }

    function getBillingPeriod(dateObj) {
        let year = dateObj.getFullYear();
        let month = dateObj.getMonth() + 1; 
        const date = dateObj.getDate();

        if (date > 15) {
            month += 1;
            if (month > 12) { month = 1; year += 1; }
        }
        const paddedMonth = String(month).padStart(2, '0');
        let startMonth = month - 1;
        let startYear = year;
        if (startMonth === 0) { startMonth = 12; startYear -= 1; }
        
        return {
            key: `${year}-${paddedMonth}`,
            displayName: `${month}月結算期`,
            durationText: `${startMonth}/16~${month}/15`,
            startTimestamp: new Date(startYear, startMonth - 1, 16, 0, 0, 0).getTime(),
            endTimestamp: new Date(year, month - 1, 15, 23, 59, 59).getTime()
        };
    }

    function renderMonths() {
        monthContainer.innerHTML = '';
        if (historyData.length === 0) {
            monthContainer.innerHTML = '<div class="empty-tips">雲端目前沒有資料，請在上方輸入第一筆紀錄吧！</div>';
            return;
        }

        const rawBase = parseFloat(baseInput.value) || 0;
        const rate = parseFloat(rateInput.value) || 0;
        const floorBase = Math.floor(rawBase);

        const groups = {};
        historyData.forEach((item) => {
            const groupKey = item.periodKey; 
            if (!groups[groupKey]) {
                groups[groupKey] = {
                    displayName: item.periodName,
                    durationText: item.periodDuration,
                    startTimestamp: item.startTimestamp || 0,
                    endTimestamp: item.endTimestamp || 0,
                    items: []
                };
            }
            groups[groupKey].items.push(item);
        });

        const sortedPeriods = Object.keys(groups).sort().reverse();

        sortedPeriods.forEach(periodKey => {
            const periodGroup = groups[periodKey];
            const periodItems = periodGroup.items;
            
            const monthBox = document.createElement('div');
            monthBox.className = 'month-box';

            const maxCurrentInPeriodRaw = Math.max(...periodItems.map(i => parseFloat(i.current) || 0));
            const floorMaxCurrent = Math.floor(maxCurrentInPeriodRaw);
            
            let usedDegrees = floorMaxCurrent - floorBase;
            if (usedDegrees < 0) usedDegrees = 0;
            const totalCost = Math.round(usedDegrees * rate);

            let daysElapsed = 1; 
            if (periodGroup.startTimestamp) {
                const latestItemTime = Math.max(...periodItems.map(i => i.timestamp || new Date().getTime()));
                const diffTime = latestItemTime - periodGroup.startTimestamp;
                const calculatedDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                const totalPeriodDays = Math.ceil((periodGroup.endTimestamp - periodGroup.startTimestamp) / (1000 * 60 * 60 * 24));
                daysElapsed = Math.max(1, Math.min(calculatedDays, totalPeriodDays));
            }
            const avgDailyCost = (totalCost / daysElapsed).toFixed(1);

            monthBox.innerHTML = `
                <div class="month-header">
                    <div class="month-name">
                        ${periodGroup.displayName}
                        <span style="font-size:10px; font-weight:normal; display:block; color:var(--text-muted); margin-top:1px;">
                            ${periodGroup.durationText}
                        </span>
                    </div>
                    <div class="month-summary">
                        累積: <span>${usedDegrees} 度</span><br>
                        金額: <span class="month-total-cost">NT$ ${totalCost.toLocaleString()}</span>
                    </div>
                </div>
                <div class="month-stats-bar">
                    <div>📊 已計：<span class="stats-val">${daysElapsed}</span> 天</div>
                    <div>⚡ 日均：<span class="stats-val">$${avgDailyCost}</span> 元</div>
                </div>
                <div class="month-items-list"></div>
            `;

            const listContainer = monthBox.querySelector('.month-items-list');

            [...periodItems].reverse().forEach(item => {
                const itemCurRaw = parseFloat(item.current) || 0;
                let itemDegRaw = itemCurRaw - rawBase;
                if (itemDegRaw < 0) itemDegRaw = 0;
                const itemCostRaw = (itemDegRaw * rate).toFixed(1);

                const itemEl = document.createElement('div');
                itemEl.className = 'history-item';
                itemEl.innerHTML = `
                    <div class="item-left">
                        <div class="item-degree">⏱️ ${itemCurRaw} 度</div>
                        <div class="item-time">${formatTimeStr(item.time)}</div>
                    </div>
                    <div class="item-right">
                        <div class="item-cost">NT$ ${itemCostRaw}</div>
                        <button class="btn-delete" data-ts="${item.timestamp}">✕</button>
                    </div>
                `;
                listContainer.appendChild(itemEl);
            });

            monthContainer.appendChild(monthBox);
        });

        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', async function() {
                const ts = this.getAttribute('data-ts');
                if(confirm('確定要刪除這筆紀錄嗎？(雲端也會同步刪除)')) {
                    showLoading(true);
                    try {
                        await fetch(API_URL, {
                            method: "POST",
                            body: JSON.stringify({ action: "delete", timestamp: ts })
                        });
                        await loadData();
                    } catch(e) { alert("刪除失敗，請檢查網路連線"); showLoading(false); }
                }
            });
        });
    }

    addRecordBtn.addEventListener('click', async () => {
        const currentVal = parseFloat(currentInput.value);
        if (isNaN(currentVal)) { alert('要填入數字才能幫你算唷！'); return; }

        showLoading(true);
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = now.getDate();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const periodInfo = getBillingPeriod(now);

        const newRecord = {
            action: "add",
