<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>租屋族電費隨手記</title>
    <style>
        :root {
            --bg-color: #fef8f0;
            --card-bg: #ffffff;
            --primary: #ffb0bc;
            --primary-dark: #ff94a4;
            --secondary: #ffebc2;
            --text-main: #6d5448;
            --text-muted: #a38f85;
            --border-color: #ecd5c5;
            --shadow: 0 8px 16px rgba(109, 84, 72, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#f7e7da 15%, transparent 15%);
            background-size: 20px 20px;
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            border: 3px solid var(--text-main);
            border-radius: 30px;
            box-shadow: 6px 6px 0px var(--text-main);
            padding: 24px;
            margin-top: 10px;
            position: relative;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            margin: 10px 0 24px 0;
            font-size: 24px;
            font-weight: 900;
        }

        h1 span {
            background: linear-gradient(transparent 60%, var(--secondary) 60%);
        }

        .section-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 800;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card {
            background: #fffdfa;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        input {
            border: 2px solid var(--text-main);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 15px;
            color: var(--text-main);
            background-color: #fff;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.03);
            outline: none;
        }

        input:focus {
            background-color: #fffdf5;
            border-color: var(--primary-dark);
        }

        .btn {
            background-color: var(--primary);
            color: var(--text-main);
            border: 2px solid var(--text-main);
            border-radius: 14px;
            padding: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 0px var(--text-main);
            transition: all 0.1s ease;
            margin-top: 8px;
        }

        .btn:hover {
            background-color: var(--primary-dark);
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px var(--text-main);
        }

        .btn-export {
            background-color: #e2f0d9;
            color: var(--text-main);
            border: 1.5px solid var(--text-main);
            border-radius: 10px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 2px 0px var(--text-main);
            transition: all 0.1s ease;
        }

        .btn-export:hover {
            background-color: #c5e0b4;
        }

        .btn-export:active {
            transform: translateY(1.5px);
            box-shadow: 0 0.5px 0px var(--text-main);
        }

        .month-box {
            background: #fff;
            border: 2px solid var(--text-main);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 4px 4px 0px var(--border-color);
        }

        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 8px;
        }

        .month-name {
            font-size: 15px;
            font-weight: 900;
            background-color: var(--secondary);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1.5px solid var(--text-main);
            line-height: 1.4;
        }

        .month-summary {
            text-align: right;
            font-size: 13px;
            font-weight: 700;
        }

        .month-total-cost {
            color: #de5462;
            font-size: 16px;
            font-weight: 800;
        }

        .month-stats-bar {
            display: flex;
            justify-content: space-between;
            background-color: #fffdf5;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            color: #8c6f60;
            margin-bottom: 10px;
            border: 1px solid #f2e3d5;
        }

        .stats-val {
            color: #de5462;
            font-weight: 800;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            font-size: 14px;
            border-bottom: 1px dotted #eee;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .item-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .item-degree {
            font-weight: 700;
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .item-cost {
            font-weight: 700;
            color: #de5462;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 6px;
        }

        .btn-delete:hover {
            color: #de5462;
            background-color: #fff0f1;
        }

        .empty-tips {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 30px 0;
        }

        .footer-tip {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 24px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1><span>🍮 租屋族電費隨手記</span></h1>

    <div class="section-title-container">
        <div class="section-title">✨ 基礎設定</div>
    </div>
    <div class="card grid-2">
        <div class="form-group">
            <label for="base">初始底數 (上期結算)</label>
            <input type="number" id="base" step="0.1" value="0">
        </div>
        <div class="form-group">
            <label for="rate">每度電費 (元)</label>
            <input type="number" id="rate" step="0.1" value="5">
        </div>
    </div>

    <div class="section-title-container">
        <div class="section-title">✍️ 紀錄今天度數</div>
    </div>
    <div class="card">
        <div class="form-group">
            <label for="current">目前看到的電表度數</label>
            <input type="number" id="current" step="0.1" placeholder="把數字填在這裡唷 (可輸入小數)">
        </div>
        <button class="btn" id="addRecordBtn">🍮 記錄並計算</button>
    </div>

    <div class="section-title-container">
        <div class="section-title">📅 結算期紀錄帳本 (15 日結算)</div>
        <button class="btn-export" id="exportBtn">🍮 匯出 Excel 檔</button>
    </div>
    <div id="monthContainer">
        </div>

    <div class="footer-tip">
        本網頁會自動存檔在你的瀏覽器中喔！<br>
        將這頁加入<b>「我的最愛」</b>或手機主畫面就可以隨時記帳囉 🐾
    </div>
</div>

<script>
    const baseInput = document.getElementById('base');
    const rateInput = document.getElementById('rate');
    const currentInput = document.getElementById('current');
    const addRecordBtn = document.getElementById('addRecordBtn');
    const exportBtn = document.getElementById('exportBtn');
    const monthContainer = document.getElementById('monthContainer');

    let historyData = [];

    function loadData() {
        if (localStorage.getItem('rent_cute_base')) baseInput.value = localStorage.getItem('rent_cute_base');
        if (localStorage.getItem('rent_cute_rate')) rateInput.value = localStorage.getItem('rent_cute_rate');
        
        const localHistory = localStorage.getItem('rent_cute_history');
        if (localHistory) {
            try { historyData = JSON.parse(localHistory); } catch (e) { historyData = []; }
        }
        renderMonths();
    }

    function saveData() {
        localStorage.setItem('rent_cute_base', baseInput.value || 0);
        localStorage.setItem('rent_cute_rate', rateInput.value || 0);
        localStorage.setItem('rent_cute_history', JSON.stringify(historyData));
    }

    function getBillingPeriod(dateObj) {
        let year = dateObj.getFullYear();
        let month = dateObj.getMonth() + 1; 
        const date = dateObj.getDate();

        if (date > 15) {
            month += 1;
            if (month > 12) {
                month = 1;
                year += 1;
            }
        }

        const paddedMonth = String(month).padStart(2, '0');
        let startMonth = month - 1;
        let startYear = year;
        if (startMonth === 0) {
            startMonth = 12;
            startYear -= 1;
        }
        
        return {
            key: `${year}-${paddedMonth}`,
            displayName: `${month}月結算期`,
            durationText: `(${startMonth}/16 ~ ${month}/15)`,
            startTimestamp: new Date(startYear, startMonth - 1, 16, 0, 0, 0).getTime(),
            endTimestamp: new Date(year, month - 1, 15, 23, 59, 59).getTime()
        };
    }

    function renderMonths() {
        monthContainer.innerHTML = '';
        
        if (historyData.length === 0) {
            monthContainer.innerHTML = '<div class="empty-tips">目前還沒有紀錄呢，在上方輸入度數來記錄第一筆吧！</div>';
            return;
        }

        const rawBase = parseFloat(baseInput.value) || 0;
        const rate = parseFloat(rateInput.value) || 0;
        
        // 💡 結算用：底數無條件捨去
        const floorBase = Math.floor(rawBase);

        const groups = {};
        historyData.forEach((item, originalIndex) => {
            const groupKey = item.periodKey; 
            if (!groups[groupKey]) {
                groups[groupKey] = {
                    displayName: item.periodName,
                    durationText: item.periodDuration,
                    startTimestamp: item.startTimestamp || 0,
                    endTimestamp: item.endTimestamp || 0,
                    items: []
                };
            }
            groups[groupKey].items.push({ ...item, originalIndex });
        });

        const sortedPeriods = Object.keys(groups).sort().reverse();

        sortedPeriods.forEach(periodKey => {
            const periodGroup = groups[periodKey];
            const periodItems = periodGroup.items;
            
            const monthBox = document.createElement('div');
            monthBox.className = 'month-box';

            const maxCurrentInPeriodRaw = Math.max(...periodItems.map(i => parseFloat(i.current) || 0));
            
            // 💡 結算用：當期最大度數自動無條件捨去
            const floorMaxCurrent = Math.floor(maxCurrentInPeriodRaw);
            
            let usedDegrees = floorMaxCurrent - floorBase;
            if (usedDegrees < 0) usedDegrees = 0;
            const totalCost = Math.round(usedDegrees * rate);

            let daysElapsed = 1; 
            if (periodGroup.startTimestamp) {
                const latestItemTime = Math.max(...periodItems.map(i => i.timestamp || new Date().getTime()));
                const diffTime = latestItemTime - periodGroup.startTimestamp;
                const calculatedDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                const totalPeriodDays = Math.ceil((periodGroup.endTimestamp - periodGroup.startTimestamp) / (1000 * 60 * 60 * 24));
                daysElapsed = Math.max(1, Math.min(calculatedDays, totalPeriodDays));
            }
            
            const avgDailyCost = (totalCost / daysElapsed).toFixed(1);

            monthBox.innerHTML = `
                <div class="month-header">
                    <div class="month-name">
                        ${periodGroup.displayName} 
                        <span style="font-size:11px; font-weight:normal; display:block; color:var(--text-muted); margin-top:2px;">
                            ${periodGroup.durationText}
                        </span>
                    </div>
                    <div class="month-summary">
                        累積: <span>${usedDegrees} 度</span><br>
                        金額: <span class="month-total-cost">NT$ ${totalCost.toLocaleString()}</span>
                    </div>
                </div>
                <div class="month-stats-bar">
                    <div>📊 此期已計：<span class="stats-val">${daysElapsed}</span> 天</div>
                    <div>⚡ 平均一天：<span class="stats-val">$${avgDailyCost}</span> 元</div>
                </div>
                <div class="month-items-list"></div>
            `;

            const listContainer = monthBox.querySelector('.month-items-list');

            periodItems.reverse().forEach(item => {
                const itemCurRaw = parseFloat(item.current) || 0;
                
                // 💡 歷史紀錄維持原樣：保留完整小數點！
                let itemDegRaw = itemCurRaw - rawBase;
                if (itemDegRaw < 0) itemDegRaw = 0;
                const itemCostRaw = (itemDegRaw * rate).toFixed(1);

                const itemEl = document.createElement('div');
                itemEl.className = 'history-item';
                itemEl.innerHTML = `
                    <div>
                        <div class="item-degree">⏱️ ${itemCurRaw} 度</div>
                        <div class="item-time">${item.time}</div>
                    </div>
                    <div class="item-right">
                        <div class="item-cost" style="color: var(--text-muted); font-weight: normal; font-size: 13px;">NT$ ${itemCostRaw}</div>
                        <button class="btn-delete" data-idx="${item.originalIndex}">✕</button>
                    </div>
                `;
                listContainer.appendChild(itemEl);
            });

            monthContainer.appendChild(monthBox);
        });

        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', function() {
                const idx = parseInt(this.getAttribute('data-idx'));
                if(confirm('確定要刪除這筆紀錄嗎？')) {
                    historyData.splice(idx, 1);
                    saveData();
                    renderMonths();
                }
            });
        });
    }

    exportBtn.addEventListener('click', () => {
        if (historyData.length === 0) {
            alert('目前還沒有任何記錄可以匯出唷！');
            return;
        }

        const rawBase = parseFloat(baseInput.value) || 0;
        const floorBase = Math.floor(rawBase);
        const rate = parseFloat(rateInput.value) || 0;

        let csvContent = "結算帳期,記帳時間,當前輸入度數(含小數),初始底數(含小數),計費單價,當期結算度數(整數捨去),當期結算金額\n";

        historyData.forEach(item => {
            const currentValRaw = parseFloat(item.current) || 0;
            const floorCurrent = Math.floor(currentValRaw);
            
            let usedDegrees = floorCurrent - floorBase;
            if (usedDegrees < 0) usedDegrees = 0;
            const cost = Math.round(usedDegrees * rate);

            csvContent += `"${item.periodName}","${item.time}",${currentValRaw},${rawBase},${rate},${usedDegrees},${cost}\n`;
        });

        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        const today = new Date();
        const dateString = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
        
        link.setAttribute("href", url);
        link.setAttribute("download", `租屋電費紀錄備份_${dateString}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    [baseInput, rateInput].forEach(input => {
        input.addEventListener('input', () => {
            saveData();
            renderMonths();
        });
    });

    addRecordBtn.addEventListener('click', () => {
        const currentVal = parseFloat(currentInput.value);
        if (isNaN(currentVal)) {
            alert('要填入數字才能幫你算唷！( •̀ ω •́ )y');
            return;
        }

        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = now.getDate();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');

        const periodInfo = getBillingPeriod(now);

        const newRecord = {
            periodKey: periodInfo.key,
            periodName: periodInfo.displayName,
            periodDuration: periodInfo.durationText,
            startTimestamp: periodInfo.startTimestamp,
            endTimestamp: periodInfo.endTimestamp,
            timestamp: now.getTime(),
            time: `${month}/${date} ${hours}:${minutes}`,
            current: currentVal
        };

        historyData.push(newRecord);
        currentInput.value = ''; 
        
        saveData();
        renderMonths();
    });

    loadData();
</script>

</body>
</html>
