<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>租屋族電費隨手記(雲端同步版)</title>
    <style>
        :root {
            --bg-color: #fef8f0;
            --card-bg: #ffffff;
            --primary: #ffb0bc;
            --primary-dark: #ff94a4;
            --secondary: #ffebc2;
            --text-main: #6d5448;
            --text-muted: #a38f85;
            --border-color: #ecd5c5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#f7e7da 15%, transparent 15%);
            background-size: 20px 20px;
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .app-container {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            border: 3px solid var(--text-main);
            border-radius: 24px;
            box-shadow: 4px 4px 0px var(--text-main);
            padding: 16px;
            margin-top: 5px;
            position: relative;
        }

        .loading-mask {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(254, 248, 240, 0.8);
            z-index: 10;
            border-radius: 24px;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            margin: 8px 0 20px 0;
            font-size: 22px;
            font-weight: 900;
        }

        h1 span { background: linear-gradient(transparent 60%, var(--secondary) 60%); }

        .section-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .section-title { font-size: 14px; font-weight: 800; color: var(--text-main); }

        .card {
            background: #fffdfa;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        
        input {
            border: 2px solid var(--text-main);
            border-radius: 10px;
            padding: 10px 8px;
            font-size: 15px;
            color: var(--text-main);
            background-color: #fff;
            outline: none;
            width: 100%;
        }

        .btn {
            background-color: var(--primary);
            color: var(--text-main);
            border: 2px solid var(--text-main);
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 3px 0px var(--text-main);
            transition: all 0.1s ease;
            margin-top: 4px;
        }

        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0px var(--text-main); }
        .btn-export {
            background-color: #e2f0d9;
            color: var(--text-main);
            border: 1.5px solid var(--text-main);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 1.5px 0px var(--text-main);
        }

        .month-box {
            background: #fff;
            border: 2px solid var(--text-main);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
            box-shadow: 3px 3px 0px var(--border-color);
        }

        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .month-name {
            font-size: 14px;
            font-weight: 900;
            background-color: var(--secondary);
            padding: 4px 8px;
            border-radius: 12px;
            border: 1.5px solid var(--text-main);
            line-height: 1.3;
        }

        .month-summary { text-align: right; font-size: 12px; font-weight: 700; line-height: 1.4; }
        .month-total-cost { color: #de5462; font-size: 15px; font-weight: 800; }

        .month-stats-bar {
            display: flex;
            justify-content: space-between;
            background-color: #fffdf5;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            color: #8c6f60;
            margin-bottom: 8px;
            border: 1px solid #f2e3d5;
        }

        .stats-val { color: #de5462; font-weight: 800; }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px;
            font-size: 14px;
            border-bottom: 1px dotted #eee;
        }
        .history-item:last-child { border-bottom: none; }
        .item-left { display: flex; flex-direction: column; gap: 2px; }
        .item-time { font-size: 11px; color: var(--text-muted); }
        .item-degree { font-weight: 700; }
        .item-right { display: flex; align-items: center; gap: 8px; }
        .item-cost { font-weight: normal; font-size: 12px; color: var(--text-muted); }
        .btn-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 4px 8px; }
        .empty-tips { text-align: center; color: var(--text-muted); font-size: 12px; padding: 20px 0; }
        .footer-tip { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 16px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="loading-mask" id="loadingMask">☁️ 雲端同步中...</div>
    <h1><span>🍮 租屋電費隨手記(雲端版)</span></h1>

    <div class="card grid-2">
        <div class="form-group">
            <label for="base">初始底數 (上期)</label>
            <input type="number" id="base" step="0.1" value="0">
        </div>
        <div class="form-group">
            <label for="rate">每度電費 (元)</label>
            <input type="number" id="rate" step="0.1" value="5">
        </div>
